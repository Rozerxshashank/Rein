<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Choose what to share</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card-bg: #16213e;
      --accent: #ff007f;
      --text: #e94560;
      --text-dim: #95a5a6;
    }
    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }
    .header {
      margin-bottom: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 1.2rem;
      margin: 0;
      color: var(--text);
    }
    .source-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
    }
    .source-item {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .source-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
    }
    .source-thumb {
      width: 100%;
      height: 80px;
      object-fit: contain;
      border-radius: 4px;
      background: #000;
      margin-bottom: 8px;
    }
    .source-name {
      font-size: 0.8rem;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Select Screen or Window</h1>
  </div>
  <div id="source-list" class="source-list">
    <!-- Sources injected here -->
  </div>

  <script>
    const sourceList = document.getElementById('source-list');

    window.electron.getSources().then(sources => {
      sources.forEach(source => {
        const item = document.createElement('div');
        item.className = 'source-item';
        item.onclick = () => window.electron.selectSource(source.id);

        const thumb = document.createElement('img');
        thumb.className = 'source-thumb';
        thumb.src = source.thumbnail;

        const name = document.createElement('div');
        name.className = 'source-name';
        name.innerText = source.name;

        item.appendChild(thumb);
        item.appendChild(name);
        sourceList.appendChild(item);
      });
    });
  </script>
</body>
</html>
